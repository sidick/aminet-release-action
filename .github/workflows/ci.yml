name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: make lint
      - run: make compile
      - run: make test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: make docker-build

  ftp-smoke:
    runs-on: ubuntu-latest
    needs: [unit-tests, docker-build]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp
      - run: make smoke
